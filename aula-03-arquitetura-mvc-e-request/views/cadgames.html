{% extends 'base.html' %}
{% block content %}

<h2>Cadastro de jogos</h2>
<hr>

<form action="{{url_for('cadgames')}}" method="POST">
    <label>Titulo</label>
    <input type="text" name="Titulo" placeholder="insira o titulo do jogo" required class="form-control">
    <label>Ano</label>
    <input type="text" name="Ano" placeholder="insira o ano do jogo" required class="form-control">
    <label>Categoria</label>
    <input type="text" name="Categoria" placeholder="insira a categoria do jogo" required class="form-control">
    <label>Plataforma</label>
    <input type="text" name="Plataforma" placeholder="insira o plataforma do jogo" required class="form-control">
    <input type="submit" value="cadastrar" class="btn btn-success">
    <input type="reset" value="limpar" class="btn btn-danger">
</form>
<br>
<hr>
<h4>Jogos cadastrados</h4>
<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>Titulo</th>
            <th>Ano</th>
            <th>categoria</th>
            <th>plataforma</th>
        </tr>
    </thead>
    <tbody>
        {% for games in listaGames %}
        <tr>
        <td>{{games.titulo}}</td>
        <td>{{games.ano}}</td>
        <td>{{games.categoria}}</td>
        <td>{{games.plataforma}}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock content %}

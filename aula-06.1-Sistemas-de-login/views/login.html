{% extends 'base.html' %}
{% block content %}
<div class="container col-4">
    <div class="card mt-4">
        <div class="card-header">
            <h2>LOGIN</h2> </div>
            <div class="card-body m-auto">
             <form action="{{url_for('login')}}" method="POST">
            <label>Email</label>
            <input type="email" name="email" class="form-control" placeholder="Insira seu e-mail" required>    
            <label>Senha</label>
            <input type="password" name="senha" class="form-control" placeholder="Insira sua senha" required> 
            <br>
            <button type="submit" class="btn btn-danger btn-block">Entrar</button>
            </form>
            <hr>
            <h6>não possui conta?<a href="{{url_for('cadastro')}}">CADASTRE-SE</a> </h6>
        </div>
    </div>
</div>
{% endblock content %}

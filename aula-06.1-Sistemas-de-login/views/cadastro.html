{% extends 'base.html' %}

{% block content %}

<!--buscando e exibindo as flash messages-->
{% with messages = get_flashed_messages(with_categories=true) %}

{% for category, message in messages %}
    <div class="alert alert-{{category}}">
        {{message}}
    </div>
{%endfor%}
{%endwith   %}

<!-- Pagina de cadastro -->
<div class="container ">
<div class="card mt-4">
<div class="card-header">
<h2>Cadastro de Usuário</h2>
</div>
<div class="card-body ">
<!-- FORMULARIO -->
 <form action="{{url_for('cadastro')}}" method="POST">
    <label>Email</label>
    <input type="email" name="email" class="form-control" placeholder="Insira seu email" required>
    <input type="password" name="senha" class="form-control" placeholder="Insira sua senha" required>
    <!-- BOTÃO -->
     <button type="submit" class="btn btn-danger btn-block">Cadastrar</button>

 </form>
</div>
</div>
</div>

{% endblock content %}

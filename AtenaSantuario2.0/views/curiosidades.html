{% extends 'base.html' %}
{% block content %}

<main class="container">

  <h1 class="mt-3">Lista de Curiosidades</h1>
  <hr />

  <ul class="list-group">

    {% for curiosidade in listaCuriosidades %}
      <li class="list-group-item">

        <h4>{{ curiosidade.titulo }}</h4>

        <p>{{ curiosidade.conteudo }}</p>

      </li>
    {% endfor %}

  </ul>

</main>

{% endblock content %}

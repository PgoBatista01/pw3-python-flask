{% extends 'base.html' %}
{% block content %}

<h2>Cadastro de Curiosidades</h2>
<hr />

<form action="{{ url_for('cadastro_curiosidades') }}" method="post">

  <label>Título</label>
  <input
    type="text"
    name="titulo"
    placeholder="Título da curiosidade"
    class="form-control"
    required
  />
  <br />

  <label>Conteúdo</label>
  <textarea
    name="conteudo"
    placeholder="Descreva a curiosidade..."
    class="form-control"
    rows="4"
    required
  ></textarea>
  <br />

  <input type="submit" value="Cadastrar" class="btn btn-success" />
  <input type="reset" value="Limpar" class="btn btn-danger" />

</form>

<br />
<hr />



{% endblock content %}
